<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Nest & Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body>
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="flex items-center space-x-2 text-[#ff6b6b] font-black text-3xl tracking-tight">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-10 h-10">
                <path fill="#ff6b6b"
                    d="M32 10c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6zm16 26c-3.1 0-6.1.9-8.6 2.6-2.2-1.6-4.9-2.6-7.4-2.6s-5.2 1-7.4 2.6C22.1 36.9 19.1 36 16 36c-7.7 0-14 6.3-14 14 0 2.2.5 4.3 1.5 6h57c1-1.7 1.5-3.8 1.5-6 0-7.7-6.3-14-14-14zm-16 8c2.8 0 5.1 2.2 5.1 5H26.9c0-2.8 2.3-5 5.1-5z" />
                <path fill="#4dadf7" d="M32 18c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4z" />
            </svg>
            <span class="hidden md:inline">Nest & Love</span>
        </a>
        <a href="/"
            class="text-gray-500 font-bold hover:text-[#4dadf7] flex items-center bg-gray-50 px-4 py-2 rounded-full"><i
                class="fa-solid fa-arrow-left mr-2"></i> Mua thêm</a>
    </header>

    <main class="max-w-[900px] mx-auto p-4 mt-8 mb-20">
        <h1 class="text-3xl font-black text-gray-800 mb-6 flex items-center">
            <i class="fa-solid fa-bag-shopping text-[#ff6b6b] mr-3"></i> Giỏ hàng của Ba Mẹ
        </h1>

        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
            <div id="cart-items" class="space-y-4"></div>

            <div class="mt-8 border-t-2 border-dashed border-gray-200 pt-6" id="checkout-section">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xl font-bold text-gray-600">Tổng thanh toán:</span>
                    <span id="cart-total" class="font-black text-[#ff6b6b] text-4xl">0 ₫</span>
                </div>
                <button
                    onclick="showWarning('Chân thành xin lỗi Ba Mẹ, tính năng Thanh toán điện tử đang được nâng cấp và sẽ sớm ra mắt!')"
                    class="w-full bg-[#ff6b6b] hover:bg-[#ff5252] text-white font-black text-xl py-4 rounded-2xl shadow-lg transition transform hover:-translate-y-1">
                    TIẾN HÀNH ĐẶT HÀNG <i class="fa-solid fa-credit-card ml-3"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="toast-warning"
        class="fixed top-20 right-8 bg-[#ffb020] text-white px-6 py-4 rounded-xl shadow-2xl transform translate-x-[150%] opacity-0 transition-all duration-300 z-50 flex items-center font-bold">
        <i class="fa-solid fa-triangle-exclamation text-2xl mr-3"></i><span id="toast-warning-msg">Tính năng sắp ra
            mắt!</span>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        const cartContainer = document.getElementById('cart-items');

        function renderCart() {
            if (cart.length === 0) {
                cartContainer.innerHTML = `<div class="text-center py-12"><p class="text-gray-500 font-bold text-xl mb-6">Giỏ hàng đang trống.</p></div>`;
                document.getElementById('checkout-section').style.display = 'none';
                return;
            }
            document.getElementById('checkout-section').style.display = 'block';
            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                html += `
                <div class="flex flex-col md:flex-row items-center justify-between border-b border-gray-100 pb-4 gap-4">
                    <div class="flex-1 w-full">
                        <p class="font-bold text-lg text-gray-800 line-clamp-1"><a href="/product/${item.id}" class="hover:text-[#ff6b6b]">${item.name}</a></p>
                    </div>
                    <div class="flex items-center justify-between w-full md:w-auto md:space-x-8">
                        <p class="font-black text-[#ff6b6b] text-xl whitespace-nowrap">₫ ${item.price.toLocaleString('vi-VN')}</p>
                        <div class="flex items-center bg-gray-50 rounded-full border border-gray-200">
                            <button onclick="changeQty('${item.id}', -1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-[#ff6b6b] font-bold rounded-l-full hover:bg-gray-100"><i class="fa-solid fa-minus"></i></button>
                            <span class="w-10 text-center font-black text-gray-800">${item.qty}</span>
                            <button onclick="changeQty('${item.id}', 1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-[#ff6b6b] font-bold rounded-r-full hover:bg-gray-100"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <button onclick="removeItem('${item.id}')" class="text-gray-400 hover:text-red-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-red-50 transition"><i class="fa-solid fa-trash-can text-lg"></i></button>
                    </div>
                </div>`;
            });
            cartContainer.innerHTML = html;
            document.getElementById('cart-total').innerText = total.toLocaleString('vi-VN') + " ₫";
        }

        function changeQty(id, delta) {
            let item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty < 1) item.qty = 1;
                saveCart();
            }
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
        }

        function showWarning(msg) {
            const toast = document.getElementById('toast-warning');
            document.getElementById('toast-warning-msg').innerText = msg;
            toast.classList.remove('translate-x-[150%]', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-x-[150%]', 'opacity-0'); }, 3000);
        }

        renderCart();
    </script>
</body>

</html>
